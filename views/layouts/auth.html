<!doctype html>
<html lang="tr">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="csrf-token" content="{{ .CsrfToken }}">
  <title>ZATRANO | {{ .Title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/brand.css" />
  <link rel="stylesheet" href="/css/admintemplate-auth.css" />
  {{if .TurnstileSiteKey}}
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  {{end}}
</head>

<body>
  <div class="auth-container">

    <div id="main-content" hx-boost="true" hx-target="this" hx-swap="innerHTML" hx-push-url="true">
      {{embed}}
    </div>

    <p class="text-center mt-3 mb-0 text-muted small">
      &copy; {{ CurrentYear }} <span class="zatrano-wordmark">ZATRANO</span> · Tüm hakları saklıdır.
    </p>
  </div>

  {{if .Success}}
  {{template "success" .}}
  {{end}}
  {{if .Error}}
  {{template "error" .}}
  {{end}}

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="/js/admintemplate-auth.js"></script>
  <script src="/js/htmx-shell.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const toastElList = document.querySelectorAll('.toast');
      toastElList.forEach(function (el) {
        if (window.bootstrap) {
          const toast = new bootstrap.Toast(el);
          toast.show();
        }
      });
    });
  </script>
  <script>
    document.addEventListener('submit', function (e) {
      const form = e.target;
      if (!form || !form.querySelector) {
        return;
      }
      const submitButtons = form.querySelectorAll('button[type="submit"], input[type="submit"]');
      submitButtons.forEach(function (btn) {
        if (btn.tagName === "BUTTON") {
          const originalContent = btn.innerHTML;
          btn.dataset.originalContent = originalContent;
          btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>İşleniyor...';
        } else {
          const originalValue = btn.value;
          btn.dataset.originalValue = originalValue;
          btn.value = 'İşleniyor...';
        }
        btn.disabled = true;
      });
    });
  </script>
</body>

</html>
