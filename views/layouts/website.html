<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{if .Title}}{{ .Title }} | ZATRANO{{else}}ZATRANO{{end}}</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/brand.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/website.css" />
  {{if .TurnstileSiteKey}}
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  {{end}}
</head>
<body>
  <header class="website-header border-bottom bg-white shadow-sm">
    <nav class="website-nav container py-3 d-flex flex-wrap gap-3 align-items-center"
      hx-boost="true" hx-target="#main-content" hx-swap="innerHTML" hx-push-url="true">
      <a href="/" class="zatrano-wordmark text-decoration-none text-body fw-semibold me-auto">ZATRANO</a>
      <a href="/iletisim" class="text-decoration-none text-muted small">İletişim</a>
    </nav>
  </header>

  <main id="main-content" class="container py-4"
    hx-boost="true" hx-target="this" hx-swap="innerHTML" hx-push-url="true">
    {{embed}}
  </main>

  <footer class="website-footer border-top py-4 mt-auto bg-white text-muted small">
    <div class="container text-center">
      © {{ CurrentYear }} <span class="zatrano-wordmark">ZATRANO</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script src="/js/htmx-shell.js"></script>
</body>
</html>
