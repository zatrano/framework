<div class="website-error">
  <div class="website-error__card">
    <span class="website-error__brand zatrano-wordmark">ZATRANO</span>
    <p class="website-error__code">{{ if .Code }}{{ .Code }}{{ else }}—{{ end }}</p>
    <h1 class="website-error__title">{{ .Title }}</h1>
    <p class="website-error__text">{{ .Message }}</p>
    <div class="website-error__actions">
      <a href="/" class="btn-website btn-website--primary">Ana sayfa</a>
      <button type="button" class="btn-website btn-website--ghost" onclick="history.back()">Geri dön</button>
    </div>
  </div>
</div>
