<div class="card card-outline card-primary shadow-lg border-0 rounded-3">
    <div class="card-header text-center bg-transparent border-bottom-0 pt-4 pb-0">
        <h4 class="mb-0 fw-bold text-primary">{{ .Title }}</h4>
        <p class="text-muted small mt-1">Lütfen yeni şifrenizi belirleyin</p>
    </div>
    <div class="card-body login-card-body p-4">

        {{if .Error}}
        <div class="alert alert-danger shadow-sm border-0 d-flex align-items-center" role="alert">
            <i class="bi bi-x-circle-fill me-2 fs-5"></i>
            <div>{{ .Error }}</div>
        </div>
        {{end}}

        <form method="POST" action="/auth/reset-password">
            <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}">
            <input type="hidden" name="token" value="{{ .Token }}">

            <div class="form-floating mb-3">
                <input id="resetPassword" type="password"
                    class="form-control {{if .ValidationErrors.new_password}}is-invalid{{end}}" name="new_password"
                    placeholder="Yeni Şifre" required autofocus />
                <label for="resetPassword" class="text-secondary"><i class="bi bi-lock me-1"></i> Yeni Şifre</label>
                {{if .ValidationErrors.new_password}}
                <span class="invalid-feedback d-block text-start ps-1" role="alert">
                    {{ .ValidationErrors.new_password }}
                </span>
                {{end}}
            </div>

            <div class="form-floating mb-3">
                <input id="resetPassword2" type="password"
                    class="form-control {{if .ValidationErrors.confirm_password}}is-invalid{{end}}"
                    name="confirm_password" placeholder="Şifre (Tekrar)" required />
                <label for="resetPassword2" class="text-secondary"><i class="bi bi-lock-fill me-1"></i> Şifre
                    (Tekrar)</label>
                {{if .ValidationErrors.confirm_password}}
                <span class="invalid-feedback d-block text-start ps-1" role="alert">
                    {{ .ValidationErrors.confirm_password }}
                </span>
                {{end}}
            </div>

            <div class="d-grid gap-2 mb-3">
                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                    <i class="bi bi-check-lg me-2"></i> Şifreyi Sıfırla
                </button>
            </div>
        </form>

        <p class="mt-4 mb-0 text-center text-muted small">
            <a href="/auth/login" class="text-primary fw-bold text-decoration-none">Girişe Dön</a>
        </p>
    </div>
</div>
