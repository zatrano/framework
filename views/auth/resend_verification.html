<div class="card card-outline card-primary shadow-lg border-0 rounded-3">
    <div class="card-header text-center bg-transparent border-bottom-0 pt-4 pb-0">
        <h4 class="mb-0 fw-bold text-primary">{{ .Title }}</h4>
        <p class="text-muted small mt-1">E-posta doğrulama linkini tekrar gönderin</p>
    </div>
    <div class="card-body login-card-body p-4">

        {{if .Error}}
        <div class="alert alert-danger shadow-sm border-0 d-flex align-items-center" role="alert">
            <i class="bi bi-x-circle-fill me-2 fs-5"></i>
            <div>{{ .Error }}</div>
        </div>
        {{end}}

        <form method="POST" action="/auth/resend-verification">
            <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}">

            <div class="form-floating mb-3">
                <input id="email" type="email" class="form-control {{if .ValidationErrors.email}}is-invalid{{end}}"
                    name="email" value="{{if .Email}}{{.Email}}{{else if .Old.email}}{{.Old.email}}{{end}}"
                    placeholder="E-Posta Adresi" required autofocus />
                <label for="email" class="text-secondary"><i class="bi bi-envelope me-1"></i> E-Posta Adresi</label>
                {{if .ValidationErrors.email}}
                <span class="invalid-feedback d-block text-start ps-1" role="alert">
                    {{ .ValidationErrors.email }}
                </span>
                {{end}}
            </div>

            <div class="alert alert-info bg-light border-0 shadow-sm d-flex align-items-center mb-4">
                <i class="bi bi-info-circle-fill text-info me-3 fs-4"></i>
                <div class="small text-muted">
                    Doğrulama linkini alabilmek için lütfen sisteme kayıtlı e-posta adresinizi giriniz.
                </div>
            </div>

            <div class="d-grid gap-2 mb-3">
                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                    <i class="bi bi-send-fill me-2"></i> Link Gönder
                </button>
            </div>
        </form>

        <div class="mt-4 text-center border-top pt-3">
            <p class="mb-1 text-muted small">
                <a href="/auth/login" class="text-decoration-none">Giriş Yap</a>
                <span class="mx-2">|</span>
                <a href="/auth/register" class="text-primary fw-bold text-decoration-none">Kayıt Ol</a>
            </p>
        </div>
    </div>
</div>
