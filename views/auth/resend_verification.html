<div class="auth-card">
  <div class="auth-header">
    <div class="auth-logo auth-logo--wordmark zatrano-wordmark">ZATRANO</div>
    <h1 class="auth-title mb-0">{{.Title}}</h1>
    <p class="auth-subtitle mt-2">E-posta doğrulama linkini tekrar gönderin</p>
  </div>

  <form method="POST" action="/auth/resend-verification" novalidate hx-boost="false">
    <input type="hidden" name="csrf_token" value="{{.CsrfToken}}">

    <div class="form-group">
      <label class="form-label" for="email">E-posta</label>
      <div class="auth-input-wrap">
        <i class="bi bi-envelope input-icon" aria-hidden="true"></i>
        <input id="email" type="email" name="email" required autofocus
          class="form-control {{if .ValidationErrors.email}}is-invalid{{end}}"
          value="{{if .Email}}{{.Email}}{{else}}{{.Old.email}}{{end}}" placeholder="ornek@sirket.com"
          autocomplete="email">
      </div>
      {{if .ValidationErrors.email}}
      <div class="invalid-feedback d-block">{{.ValidationErrors.email}}</div>
      {{end}}
    </div>

    <div class="alert alert-light border shadow-sm d-flex align-items-start mb-4" role="status">
      <i class="bi bi-info-circle-fill text-primary me-2 mt-1"></i>
      <div class="small text-secondary mb-0">
        Doğrulama linkini alabilmek için sisteme kayıtlı e-posta adresinizi girin.
      </div>
    </div>

    <button type="submit" class="btn-primary w-100">
      <i class="bi bi-send-fill"></i>
      Link gönder
    </button>
  </form>

  <div class="auth-footer">
    <p class="mb-0 auth-inline-links text-center">
      <a href="/auth/login">Giriş</a>
      <span class="text-muted mx-2">|</span>
      <a href="/auth/register">Kayıt ol</a>
    </p>
  </div>
</div>
