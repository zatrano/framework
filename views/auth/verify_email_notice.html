<div class="auth-card text-center">
  <div class="auth-state-icon auth-state-icon--success">
    <i class="bi bi-envelope-check-fill" style="font-size: 2.25rem;" aria-hidden="true"></i>
  </div>

  <h1 class="auth-title mb-0">E-postanızı kontrol edin</h1>
  <p class="auth-subtitle mt-3">
    E-posta adresinize bir doğrulama bağlantısı gönderdik.<br>
    Kaydı tamamlamak için lütfen e-postadaki bağlantıya tıklayın.
  </p>

  <div class="alert alert-light border text-start d-flex align-items-start small my-4">
    <i class="bi bi-info-circle text-secondary me-2 flex-shrink-0"></i>
    <span class="text-secondary">
      E-postayı göremiyorsanız <strong>Spam / Önemsiz</strong> klasörüne de bakın.
    </span>
  </div>

  <a href="/auth/resend-verification{{if .UserEmail}}?email={{.UserEmail | urlquery}}{{end}}"
    class="btn-social text-decoration-none w-100">
    <i class="bi bi-arrow-repeat"></i>
    E-posta gelmediyse tekrar gönder
  </a>

  <div class="auth-footer border-0 pt-3 mt-3">
    <p class="mb-0"><a href="/auth/login">Giriş sayfası</a></p>
  </div>
</div>
