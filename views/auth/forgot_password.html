<div class="card card-outline card-primary shadow-lg border-0 rounded-3">
    <div class="card-header text-center bg-transparent border-bottom-0 pt-4 pb-0">
        <h4 class="mb-0 fw-bold text-primary">{{ .Title }}</h4>
        <p class="text-muted small mt-1">Şifrenizi sıfırlamak için e-posta adresinizi girin</p>
    </div>
    <div class="card-body login-card-body p-4">

        {{if .Error}}
        <div class="alert alert-danger shadow-sm border-0 d-flex align-items-center" role="alert">
            <i class="bi bi-x-circle-fill me-2 fs-5"></i>
            <div>{{ .Error }}</div>
        </div>
        {{end}}

        <form method="POST" action="/auth/forgot-password">
            <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}">

            <div class="form-floating mb-3">
                <input id="email" type="email" class="form-control {{if .ValidationErrors.email}}is-invalid{{end}}"
                    name="email" value="{{ .Old.email }}" placeholder="E-Posta Adresi" required autofocus />
                <label for="email" class="text-secondary"><i class="bi bi-envelope me-1"></i> E-Posta Adresi</label>
                {{if .ValidationErrors.email}}
                <span class="invalid-feedback d-block text-start ps-1" role="alert">
                    {{ .ValidationErrors.email }}
                </span>
                {{end}}
            </div>

            <div class="d-grid gap-2 mb-3">
                <button type="submit" class="btn btn-primary btn-lg shadow-sm">
                    <i class="bi bi-send-fill me-2"></i> Sıfırlama Linki Gönder
                </button>
            </div>
        </form>

        <p class="mt-4 mb-0 text-center text-muted small">
            Hatırladınız mı? <a href="/auth/login" class="text-primary fw-bold text-decoration-none">Girişe Dön</a>
        </p>
    </div>
</div>
