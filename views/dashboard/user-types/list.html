<div class="at-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">{{.Title}}</h1>
            <div class="at-breadcrumb">
                <a href="/dashboard/home">Ana sayfa</a>
                <i class="bi bi-chevron-right"></i>
                <span>Kullanıcı türleri</span>
                <i class="bi bi-chevron-right"></i>
                <span>Liste</span>
            </div>
        </div>
        <a href="/dashboard/user-types/create" class="btn-tpl-primary"><i class="bi bi-plus-lg"></i> Yeni ekle</a>
    </div>
    <div class="at-surface">
        <div class="at-surface__head">
            <h2 class="at-surface__title">Tüm kullanıcı türleri</h2>
            <button class="btn btn-sm btn-outline-secondary" type="button" data-bs-toggle="collapse" data-bs-target="#filterCollapse"><i class="bi bi-funnel"></i> Filtrele</button>
        </div>
        <div class="collapse" id="filterCollapse">
            <div class="at-filter-collapse">
                <form action="/dashboard/user-types" method="GET">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <input type="text" class="form-control" name="name" value="{{.Params.Name}}" placeholder="Kullanıcı türü ara...">
                        </div>
                        <div class="col-md-6">
                            <select class="form-select" name="is_active">
                                <option value="">Tüm durumlar</option>
                                <option value="true" {{if eq .Params.IsActive "true"}}selected{{end}}>Aktif</option>
                                <option value="false" {{if eq .Params.IsActive "false"}}selected{{end}}>Pasif</option>
                            </select>
                        </div>
                    </div>
                    <div class="row g-3 align-items-end">
                        <div class="col-xl-2 col-md-4">
                            <label class="form-label small">Sırala</label>
                            <select class="form-select" name="sortBy">
                                <option value="id" {{if eq .Params.SortBy "id"}}selected{{end}}>ID</option>
                                <option value="name" {{if eq .Params.SortBy "name"}}selected{{end}}>Ad</option>
                            </select>
                        </div>
                        <div class="col-xl-2 col-md-4">
                            <label class="form-label small">Yön</label>
                            <select class="form-select" name="orderBy">
                                <option value="asc" {{if eq .Params.OrderBy "asc"}}selected{{end}}>Artan</option>
                                <option value="desc" {{if eq .Params.OrderBy "desc"}}selected{{end}}>Azalan</option>
                            </select>
                        </div>
                        <div class="col-xl-2 col-md-4">
                            <label class="form-label small">Kayıt / sayfa</label>
                            <select class="form-select" name="perPage">
                                <option value="20" {{if eq .Params.PerPage 20}}selected{{end}}>20</option>
                                <option value="50" {{if eq .Params.PerPage 50}}selected{{end}}>50</option>
                                <option value="100" {{if eq .Params.PerPage 100}}selected{{end}}>100</option>
                                <option value="200" {{if eq .Params.PerPage 200}}selected{{end}}>200</option>
                            </select>
                        </div>
                        <div class="col-xl-3 col-md-6">
                            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-funnel"></i> Uygula</button>
                        </div>
                        <div class="col-xl-3 col-md-6">
                            <a href="/dashboard/user-types" class="btn btn-outline-secondary w-100"><i class="bi bi-x-lg"></i> Temizle</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        <div class="at-surface__body">
            <div class="table-responsive">
                <table class="at-table">
                    <thead>
                        <tr>
                            <th class="text-center" style="width:60px">#</th>
                            <th>Ad</th>
                            <th class="text-center">Durum</th>
                            <th class="text-center" style="width:120px">İşlem</th>
                        </tr>
                    </thead>
                    <tbody>
                        {{if .Result.Data}}{{range .Result.Data}}
                        <tr>
                            <td class="text-center text-muted small">{{.ID}}</td>
                            <td class="fw-semibold">{{.Name}}</td>
                            <td class="text-center">{{if .IsActive}}<span class="at-badge at-badge--success">Aktif</span>{{else}}<span class="at-badge at-badge--danger">Pasif</span>{{end}}</td>
                            <td>
                                <div class="action-buttons">
                                    <a href="/dashboard/user-types/update/{{.ID}}" class="btn-action" title="Düzenle"><i class="bi bi-pencil"></i></a>
                                    <button type="button" class="btn-action delete" onclick="confirmDelete('{{.ID}}')" title="Sil"><i class="bi bi-trash"></i></button>
                                </div>
                            </td>
                        </tr>
                        {{end}}{{else}}
                        <tr><td colspan="4" class="at-empty">Henüz kayıt yok.</td></tr>
                        {{end}}
                    </tbody>
                </table>
            </div>
        </div>
        <div class="at-surface__foot">
            <span class="text-muted small"></span>
            <div class="w-100 w-md-auto">{{template "pagination" .}}</div>
        </div>
    </div>
</div>
<script>
function confirmDelete(id) {
    if (confirm('Bu kullanıcı tipini silmek istediğinize emin misiniz?')) {
        fetch('/dashboard/user-types/delete/' + id, { method: 'DELETE', headers: { 'X-CSRF-Token': '{{.CsrfToken}}', 'Accept': 'application/json' }})
            .then(r => { if (r.ok) location.reload(); else alert('Silinemedi.'); }).catch(() => alert('Hata.'));
    }
}
</script>
