<div class="at-page">
    <div class="page-header">
        <div>
            <h1 class="page-title">{{.Title}}</h1>
            <div class="at-breadcrumb">
                <a href="/dashboard">Ana sayfa</a>
                <i class="bi bi-chevron-right"></i>
                <a href="/dashboard/user-types">Kullanıcı türleri</a>
                <i class="bi bi-chevron-right"></i>
                <span>Düzenle</span>
            </div>
        </div>
    </div>
    <div class="at-surface">
        <div class="at-surface__head">
            <h2 class="at-surface__title"><i class="bi bi-person-badge me-2"></i>Kullanıcı türü düzenle</h2>
        </div>
        <form action="/dashboard/user-types/update/{{.UserType.ID}}" method="POST" class="needs-validation" novalidate hx-boost="false">
            <input type="hidden" name="csrf_token" value="{{.CsrfToken}}">
            <div class="at-surface__body at-surface__body--padded">
                <div class="at-form-group">
                    <label class="at-form-label" for="name">Kullanıcı türü adı <span class="at-required">*</span></label>
                    <input type="text" id="name" name="name" class="form-control {{if index .ValidationErrors "name"}}is-invalid{{end}}" value="{{if .FormData}}{{index .FormData "name"}}{{else}}{{.UserType.Name}}{{end}}" required>
                    {{if index .ValidationErrors "name"}}<div class="invalid-feedback d-block">{{index .ValidationErrors "name"}}</div>{{end}}
                </div>
                <div class="at-form-group">
                    <label class="at-form-label" for="is_active">Durum <span class="at-required">*</span></label>
                    <select id="is_active" name="is_active" class="form-select {{if index .ValidationErrors "is_active"}}is-invalid{{end}}" required>
                        <option value="true" {{if .FormData}}{{if eq (index .FormData "is_active") "true"}}selected{{end}}{{else}}{{if .UserType.IsActive}}selected{{end}}{{end}}>Aktif</option>
                        <option value="false" {{if .FormData}}{{if eq (index .FormData "is_active") "false"}}selected{{end}}{{else}}{{if not .UserType.IsActive}}selected{{end}}{{end}}>Pasif</option>
                    </select>
                    {{if index .ValidationErrors "is_active"}}<div class="invalid-feedback d-block">{{index .ValidationErrors "is_active"}}</div>{{end}}
                </div>
                <div class="at-form-actions">
                    <a href="/dashboard/user-types" class="btn-tpl-secondary"><i class="bi bi-x-lg"></i> İptal</a>
                    <button type="submit" class="btn-tpl-primary"><i class="bi bi-check-lg"></i> Güncelle</button>
                </div>
            </div>
        </form>
    </div>
</div>
<script>
(() => {
    document.querySelectorAll('.needs-validation').forEach(form => {
        form.addEventListener('submit', e => { if (!form.checkValidity()) { e.preventDefault(); e.stopPropagation(); } form.classList.add('was-validated'); });
    });
})();
</script>
