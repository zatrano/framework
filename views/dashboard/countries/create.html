<div class="row">
    <div class="col-12">
        <div class="card dashboard-card">
            <div class="card-header bg-transparent border-bottom" style="padding: 1.25rem 2rem;">
                <h5 class="card-title mb-0" style="font-weight: 600; font-size: 1.2rem;">
                    <i class="bi bi-globe me-2"></i>Yeni Ülke Ekle
                </h5>
            </div>

            <form method="POST" action="/dashboard/countries/create" novalidate>
                <input type="hidden" name="csrf_token" value="{{ .CsrfToken }}">

                <div class="card-body" style="padding: 2rem;">

                    <!-- Ülke Adı -->
                    <div class="mb-3">
                        <label class="form-label">Ülke Adı</label>
                        <input type="text" name="name"
                            class="form-control {{ if index .ValidationErrors "name" }}is-invalid{{ end }}"
                            value="{{ if .FormData }}{{ index .FormData "name" }}{{ end }}" required>
                        {{ if index .ValidationErrors "name" }}
                        <div class="invalid-feedback d-block">{{ index .ValidationErrors "name" }}</div>
                        {{ else }}
                        <div class="valid-feedback">Doğru!</div>
                        {{ end }}
                    </div>

                    <!-- Durum -->
                    <div class="mb-3">
                        <label class="form-label">Durum</label>
                        <select name="is_active" class="form-select {{ if index .ValidationErrors "is_active" }}is-invalid{{ end }}" required>
                            <option value="true" {{ if eq (index .FormData "is_active") "true" }}selected{{ end }}>Aktif</option>
                            <option value="false" {{ if eq (index .FormData "is_active") "false" }}selected{{ end }}>Pasif</option>
                        </select>
                        {{ if index .ValidationErrors "is_active" }}
                        <div class="invalid-feedback d-block">{{ index .ValidationErrors "is_active" }}</div>
                        {{ else }}
                        <div class="valid-feedback">Doğru!</div>
                        {{ end }}
                    </div>

                </div>

                <!-- Footer -->
                <div class="card-footer">
                    <div class="row">
                        <div class="col-4">
                            <a href="/dashboard/countries" class="btn btn-secondary w-100">
                                <i class="bi bi-arrow-left"></i> Geri
                            </a>
                        </div>
                        <div class="col-8">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-check-lg"></i> Kaydet
                            </button>
                        </div>
                    </div>
                </div>

            </form>
        </div>
    </div>
</div>
